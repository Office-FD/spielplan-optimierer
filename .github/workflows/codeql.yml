name: CodeQL

# Statisches Security-Scanning (Python).
# Findet z. B.: Path-Traversal, unsafe pickle.load, SQL-Injection,
# Command-Injection, unsafe deserialization, etc.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Wöchentlich montags 04:00 UTC (deckt auch unverändert lange Branches ab)
    - cron: '0 4 * * 1'

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: CodeQL initialisieren
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyse ausführen
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
