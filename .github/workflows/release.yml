name: Release erstellen

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Hinweis: actions/checkout, actions/setup-python und softprops/action-gh-release
      # sind via Major-Version-Tag gepinnt. Fuer hoechste Supply-Chain-Sicherheit
      # auf vollstaendige Commit-SHAs umstellen (z.B. via Dependabot konfigurieren).
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Tag-Version vs. VERSION-Datei prüfen
        # Verhindert Update-Schleifen: Wenn git tag v1.3.0 gepusht wird, aber
        # die VERSION-Datei noch 1.2.9 enthält, würde der Auto-Updater nach
        # Install endlos ein "neueres" v1.3.0 finden.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' (=$TAG_VERSION) stimmt nicht mit VERSION-Datei ($FILE_VERSION) überein."
            echo "Bitte VERSION-Datei vor dem Tag-Push aktualisieren."
            exit 1
          fi
          echo "Tag $TAG_VERSION matcht VERSION-Datei."

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Tests ausführen (Test-Gate vor Release)
        run: pytest test_pytest_runner.py -v

      - name: app-files.zip erstellen
        run: python build_release.py

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: app-files.zip
          generate_release_notes: true
          name: "Spielplan-Optimierer ${{ github.ref_name }}"
          body: |
            ## Installation

            **Erstinstallation:** Setup-Datei herunterladen und ausführen.
            Der Installer lädt automatisch diese App-Version von GitHub.

            **Update:** Einfach die neue `app-files.zip` – der Launcher meldet
            beim nächsten Start, dass ein Update verfügbar ist.

            ---
            *Vollständige Änderungen siehe Commits seit dem letzten Tag.*
