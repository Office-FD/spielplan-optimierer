name: Coverage

# Misst Test-Coverage mit coverage.py.
# Laeuft NUR auf push:main (nicht auf PRs), um die CI nicht zu verdoppeln.
# Test-Gating macht weiterhin test.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:  # erlaubt manuelles Triggern

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Coverage messen
        run: python run_coverage.py --html

      - name: Coverage-Report (Übersicht)
        if: always()
        run: python -m coverage report

      - name: Coverage-Gate (Warning ab < 70 %)
        # R7-D7-L1: Heads-Up wenn Coverage unter Schwelle faellt.
        # Continue-on-error: kein hartes CI-Gate — kein Refactor wird durch
        # vorübergehenden Coverage-Drop blockiert. Wer das harten Gate will,
        # entfernt `continue-on-error` hier.
        if: always()
        continue-on-error: true
        run: python -m coverage report --fail-under=70

      - name: HTML-Report als Artifact hochladen
        if: always()
        # R8-H-L2: konsistent mit anderen Workflows (checkout/setup-python @v6).
        uses: actions/upload-artifact@v5
        with:
          name: coverage-html
          path: coverage_html/
          retention-days: 30
